name: Build and Push

on:
  push:
    branches: [main]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      changes: ${{ steps.set-matrix.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            config-server: spring-petclinic-config-server/**
            discovery-server: spring-petclinic-discovery-server/**
            api-gateway: spring-petclinic-api-gateway/**
            customers-service: spring-petclinic-customers-service/**
            visits-service: spring-petclinic-visits-service/**
            vets-service: spring-petclinic-vets-service/**
            genai-service: spring-petclinic-genai-service/**
            admin-server: spring-petclinic-admin-server/**
      - name: Set changed services matrix
        id: set-matrix
        uses: actions/github-script@v7
        with:
          script: |
            const changes = ${{ toJson(steps.changes.outputs) }};
            const services = Object.keys(changes).filter(k => changes[k] === 'true');
            core.setOutput('changes', JSON.stringify(services));

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.changes != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.changes) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: maven

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Build image (ARM64)
        run: |
          mvn -B -pl spring-petclinic-${{ matrix.service }} -am \
            clean install -P buildDocker \
            -Dcontainer.platform="linux/arm64" -DskipTests

      - name: Tag image for ECR
        run: |
          SOURCE="springcommunity/spring-petclinic-${{ matrix.service }}:latest"
          TARGET="${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/petclinic-dev/${{ matrix.service }}:${{ env.SHORT_SHA }}"
          echo "ECR_IMAGE=$TARGET" >> "$GITHUB_ENV"
          docker tag "$SOURCE" "$TARGET"

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_IMAGE }}
          severity: CRITICAL
          exit-code: '1'

      - name: Push image to ECR
        run: docker push "$ECR_IMAGE"

  dispatch:
    needs: [detect-changes, build]
    if: always() && needs.detect-changes.outputs.changes != '[]' && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to platform repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PLATFORM_REPO_TOKEN }}
          repository: PetClinicCloudNative/petclinic-platform
          event-type: app-image-built
          client-payload: '{"sha":"${{ github.sha }}","services":${{ needs.detect-changes.outputs.changes }}}'
